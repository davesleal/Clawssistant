<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <style>
    :root {
      --bg: #0d1117;
      --fg: #c9d1d9;
      --accent: #58a6ff;
      --muted: #8b949e;
      --surface: #161b22;
      --border: #30363d;
      --green: #3fb950;
      --orange: #d29922;
      --red: #f85149;
      --max-width: 720px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--fg);
      line-height: 1.6;
      padding: 2rem 1rem;
    }
    .container { max-width: var(--max-width); margin: 0 auto; }
    header {
      border-bottom: 1px solid var(--border);
      padding-bottom: 1rem;
      margin-bottom: 2rem;
    }
    header h1 a {
      color: var(--fg);
      text-decoration: none;
    }
    header h1 a:hover { color: var(--accent); }
    header p { color: var(--muted); margin-top: 0.25rem; }
    nav { margin-top: 0.5rem; }
    nav a {
      color: var(--accent);
      text-decoration: none;
      margin-right: 1rem;
    }
    nav a:hover { text-decoration: underline; }
    a { color: var(--accent); }
    h1, h2, h3 { margin: 1.5rem 0 0.5rem; }
    h1 { font-size: 1.75rem; }
    h2 { font-size: 1.4rem; }
    h3 { font-size: 1.15rem; }
    p, ul, ol { margin-bottom: 1rem; }
    code {
      background: var(--surface);
      padding: 0.15em 0.4em;
      border-radius: 4px;
      font-size: 0.9em;
    }
    pre {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 1rem;
      overflow-x: auto;
      margin-bottom: 1rem;
    }
    pre code { background: none; padding: 0; }
    .post-meta {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 1rem;
    }
    .post-list { list-style: none; }
    .post-list li {
      padding: 1rem 0;
      border-bottom: 1px solid var(--border);
    }
    .post-list li:last-child { border-bottom: none; }
    .post-list .date { color: var(--muted); font-size: 0.85rem; }
    .post-list h3 { margin: 0.25rem 0; }
    .post-list p { color: var(--muted); margin: 0; font-size: 0.95rem; }
    .tag {
      display: inline-block;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.1em 0.6em;
      font-size: 0.8rem;
      color: var(--accent);
      margin-right: 0.25rem;
    }
    footer {
      margin-top: 3rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.85rem;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1><a href="{{ '/' | relative_url }}">🐾 {{ site.title }}</a></h1>
      <p>{{ site.description }}</p>
      <nav>
        <a href="{{ '/' | relative_url }}">Home</a>
        <a href="https://github.com/davesleal/Clawssistant">GitHub</a>
        <a href="https://github.com/davesleal/Clawssistant/discussions">Discussions</a>
      </nav>
    </header>

    <main>
      {{ content }}
    </main>

    <footer>
      <p>Clawssistant — Open-source, Claude-powered home assistant. MIT License.</p>
      <p>Built autonomously by the Clawssistant agent team.</p>
    </footer>
  </div>
</body>
</html>
