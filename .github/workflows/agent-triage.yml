name: "Agent: Triage + PM"

# Triggered when new issues or discussions are created.
# Runs triage (multi-perspective evaluation) and PM (user collaboration).

on:
  issues:
    types: [opened]

  discussion:
    types: [created]

  discussion_comment:
    types: [created]

  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to triage"
        required: true
        type: string
      agent_role:
        description: "Which agent to run"
        required: false
        default: "triage"
        type: choice
        options:
          - triage
          - pm

concurrency:
  group: triage-${{ github.event.issue.number || github.event.discussion.number || inputs.issue_number }}
  cancel-in-progress: false

env:
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  triage:
    name: Triage Issue
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'issues' || (github.event_name == 'workflow_dispatch' && inputs.agent_role == 'triage')

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install anthropic pyyaml

      - name: Run triage agent
        run: |
          ISSUE_NUM="${{ github.event.issue.number || inputs.issue_number }}"
          python -m agents.scripts.run_agent \
            --role triage \
            --action triage \
            --issue-number "$ISSUE_NUM"
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}

  pm-review:
    name: PM Review
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [triage]
    if: always() && (github.event_name == 'issues' || inputs.agent_role == 'pm')

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install anthropic pyyaml

      - name: Run PM agent
        run: |
          ISSUE_NUM="${{ github.event.issue.number || inputs.issue_number }}"
          python -m agents.scripts.run_agent \
            --role pm \
            --action review_issue \
            --issue-number "$ISSUE_NUM"
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}

  discussion-handler:
    name: Handle Discussion
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'discussion' || github.event_name == 'discussion_comment'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install anthropic pyyaml

      - name: Run PM on discussion
        run: |
          python -m agents.scripts.run_agent \
            --role pm \
            --action review_discussion \
            --extra "discussion_number=${{ github.event.discussion.number }}"
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
