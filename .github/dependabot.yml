version: 2
updates:
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
    groups:
      dev-dependencies:
        patterns:
          - "pytest*"
          - "ruff"
          - "mypy"
          - "pre-commit"
          - "pip-audit"
      ai-dependencies:
        patterns:
          - "anthropic"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
