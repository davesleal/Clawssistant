name: Bug Report
description: Report a bug in Clawssistant
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the sections below.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Configure ...
        2. Say "..."
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: input
    id: hardware
    attributes:
      label: Hardware
      description: What hardware are you running on?
      placeholder: "Raspberry Pi 5 8GB / x86 mini PC / etc."

  - type: input
    id: os
    attributes:
      label: OS
      description: Operating system and version
      placeholder: "Raspberry Pi OS Bookworm / Ubuntu 24.04 / etc."

  - type: input
    id: version
    attributes:
      label: Clawssistant Version
      description: Output of `python -m clawssistant --version`

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Paste any relevant log output (redact API keys!)
      render: shell

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Voice Pipeline (wake word, STT, TTS)
        - Claude Brain / Conversation
        - Home Assistant Integration
        - Skills
        - API Server
        - MCP
        - Satellite
        - Configuration
        - Other
